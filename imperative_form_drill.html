<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ます形 → 命令形 変換ドリル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1.5rem;max-width:680px;margin:0 auto}
.header{padding:1.5rem 0 1rem;border-bottom:1px solid #e0ddd5;margin-bottom:1.5rem}
.header h2{font-size:20px;font-weight:500;margin-bottom:4px}
.header p{font-size:13px;color:#666}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.stat{background:#eeecea;border-radius:8px;padding:0.75rem;text-align:center}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-num{font-size:22px;font-weight:500;color:#1a1a1a}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.group-badge{display:inline-block;font-size:12px;padding:3px 10px;border-radius:8px;margin-bottom:1rem;font-weight:500}
.g1{background:#e6f1fb;color:#185fa5}
.g2{background:#eaf3de;color:#3b6d11}
.g3{background:#faeeda;color:#854f0b}
.masu{font-size:28px;font-weight:500;margin-bottom:1.25rem}
.input-row{display:flex;gap:8px;align-items:center}
.input-row input{flex:1;font-size:20px;padding:8px 12px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;outline:none}
.input-row input:focus{box-shadow:0 0 0 2px #b5d4f4}
.btn{padding:8px 20px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer}
.btn:hover{background:#f0eeea}
.btn:active{transform:scale(0.98)}
.btn-primary{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4}
.result{margin-top:1rem;padding:0.75rem 1rem;border-radius:8px;font-size:15px;display:none}
.result.correct{background:#eaf3de;color:#3b6d11}
.result.wrong{background:#fcebeb;color:#a32d2d}
.hint{font-size:13px;color:#888;margin-top:0.5rem;display:none}
.nav{display:flex;gap:8px;margin-top:1rem}
.progress{height:4px;background:#e0ddd5;border-radius:2px;margin-bottom:1.5rem}
.progress-bar{height:4px;background:#378add;border-radius:2px;transition:width 0.3s}
.filter-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:4px 12px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#888;cursor:pointer}
.filter-btn.active{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4}
.complete{text-align:center;padding:2rem;display:none}
.complete h3{font-size:20px;font-weight:500;margin-bottom:0.5rem}
</style>
</head>
<body>
<div class="header">
  <h2>ます形 → 命令形 変換ドリル</h2>
  <p>ます形から命令形に変えてください。漢字・ひらがなどちらでも正解です。※命令形は強い指示表現です。</p>
</div>
<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-btn" onclick="setFilter(1,this)">グループ1</button>
  <button class="filter-btn" onclick="setFilter(2,this)">グループ2</button>
  <button class="filter-btn" onclick="setFilter(3,this)">グループ3</button>
</div>
<div class="stats">
  <div class="stat"><div class="stat-label">問題数</div><div class="stat-num" id="total-num">0</div></div>
  <div class="stat"><div class="stat-label">正解</div><div class="stat-num" id="correct-num" style="color:#3b6d11">0</div></div>
  <div class="stat"><div class="stat-label">不正解</div><div class="stat-num" id="wrong-num" style="color:#a32d2d">0</div></div>
</div>
<div class="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div class="card" id="drill-card">
  <div id="group-badge" class="group-badge g1"></div>
  <div class="masu" id="masu-form"></div>
  <div class="input-row">
    <input type="text" id="answer-input" placeholder="命令形を入力" onkeydown="if(event.key==='Enter')checkAnswer()">
    <button class="btn btn-primary" onclick="checkAnswer()">確認</button>
  </div>
  <div class="hint" id="hint-text"></div>
  <div class="result" id="result-box"></div>
  <div class="nav">
    <button class="btn" onclick="showHint()">ヒント</button>
    <button class="btn" onclick="nextQuestion()" id="next-btn" style="display:none">次へ</button>
  </div>
</div>
<div class="complete" id="complete-box">
  <h3>おつかれさまでした！</h3>
  <p id="score-text" style="color:#888;margin-bottom:1.5rem;font-size:15px"></p>
  <button class="btn btn-primary" onclick="restart()">もう一度</button>
</div>
<script>
const allVerbs=[
  {masu:'書きます',imp:'書け',hira:'かけ',group:1,hint:'く→け'},
  {masu:'聞きます',imp:'聞け',hira:'きけ',group:1,hint:'く→け'},
  {masu:'泳ぎます',imp:'泳げ',hira:'およげ',group:1,hint:'ぐ→げ'},
  {masu:'急ぎます',imp:'急げ',hira:'いそげ',group:1,hint:'ぐ→げ'},
  {masu:'話します',imp:'話せ',hira:'はなせ',group:1,hint:'す→せ'},
  {masu:'貸します',imp:'貸せ',hira:'かせ',group:1,hint:'す→せ'},
  {masu:'待ちます',imp:'待て',hira:'まて',group:1,hint:'つ→て'},
  {masu:'持ちます',imp:'持て',hira:'もて',group:1,hint:'つ→て'},
  {masu:'飲みます',imp:'飲め',hira:'のめ',group:1,hint:'む→め'},
  {masu:'読みます',imp:'読め',hira:'よめ',group:1,hint:'む→め'},
  {masu:'遊びます',imp:'遊べ',hira:'あそべ',group:1,hint:'ぶ→べ'},
  {masu:'呼びます',imp:'呼べ',hira:'よべ',group:1,hint:'ぶ→べ'},
  {masu:'買います',imp:'買え',hira:'かえ',group:1,hint:'う→え'},
  {masu:'会います',imp:'会え',hira:'あえ',group:1,hint:'う→え'},
  {masu:'帰ります',imp:'帰れ',hira:'かえれ',group:1,hint:'る→れ'},
  {masu:'乗ります',imp:'乗れ',hira:'のれ',group:1,hint:'る→れ'},
  {masu:'分かります',imp:'分かれ',hira:'わかれ',group:1,hint:'る→れ'},
  {masu:'送ります',imp:'送れ',hira:'おくれ',group:1,hint:'る→れ'},
  {masu:'食べます',imp:'食べろ',hira:'たべろ',group:2,hint:'ます→ろ'},
  {masu:'見ます',imp:'見ろ',hira:'みろ',group:2,hint:'ます→ろ'},
  {masu:'起きます',imp:'起きろ',hira:'おきろ',group:2,hint:'ます→ろ'},
  {masu:'教えます',imp:'教えろ',hira:'おしえろ',group:2,hint:'ます→ろ'},
  {masu:'覚えます',imp:'覚えろ',hira:'おぼえろ',group:2,hint:'ます→ろ'},
  {masu:'開けます',imp:'開けろ',hira:'あけろ',group:2,hint:'ます→ろ'},
  {masu:'閉めます',imp:'閉めろ',hira:'しめろ',group:2,hint:'ます→ろ'},
  {masu:'借ります',imp:'借りろ',hira:'かりろ',group:2,hint:'ます→ろ'},
  {masu:'降ります',imp:'降りろ',hira:'おりろ',group:2,hint:'ます→ろ'},
  {masu:'出かけます',imp:'出かけろ',hira:'でかけろ',group:2,hint:'ます→ろ'},
  {masu:'します',imp:'しろ',hira:'しろ',group:3,hint:'します→しろ'},
  {masu:'来ます',imp:'来い',hira:'こい',group:3,hint:'来ます→来い'},
];
const groupLabels={1:'グループ１（u動詞）',2:'グループ２（ru動詞）',3:'グループ３（不規則）'};
const groupClasses={1:'g1',2:'g2',3:'g3'};
let verbs=[...allVerbs],queue=[],current=null;
let totalAnswered=0,correctCount=0,wrongCount=0,answered=false,currentFilter='all';
function isCorrect(val,v){return val===v.imp||val===v.hira;}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');restart();}
function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}
function restart(){
  verbs=currentFilter==='all'?[...allVerbs]:allVerbs.filter(v=>v.group===currentFilter);
  queue=shuffle([...verbs]);totalAnswered=0;correctCount=0;wrongCount=0;updateStats();
  document.getElementById('complete-box').style.display='none';
  document.getElementById('drill-card').style.display='block';
  document.getElementById('progress-bar').style.width='0%';showQuestion();
}
function updateStats(){
  document.getElementById('total-num').textContent=totalAnswered;
  document.getElementById('correct-num').textContent=correctCount;
  document.getElementById('wrong-num').textContent=wrongCount;
}
function showQuestion(){
  if(queue.length===0){showComplete();return;}
  current=queue.shift();answered=false;
  document.getElementById('masu-form').textContent=current.masu;
  const badge=document.getElementById('group-badge');
  badge.textContent=groupLabels[current.group];badge.className='group-badge '+groupClasses[current.group];
  document.getElementById('answer-input').value='';
  document.getElementById('answer-input').disabled=false;
  document.getElementById('result-box').style.display='none';
  document.getElementById('hint-text').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('answer-input').focus();
  const done=verbs.length-queue.length-1;
  document.getElementById('progress-bar').style.width=Math.max(0,Math.round((done/verbs.length)*100))+'%';
}
function nextQuestion(){if(!answered)return;showQuestion();}
function checkAnswer(){
  if(answered)return;
  const val=document.getElementById('answer-input').value.trim();if(!val)return;
  answered=true;totalAnswered++;
  const rb=document.getElementById('result-box');rb.style.display='block';
  document.getElementById('answer-input').disabled=true;
  document.getElementById('next-btn').style.display='inline-block';
  if(isCorrect(val,current)){correctCount++;rb.className='result correct';rb.textContent='正解！　'+current.imp+'（'+current.hira+'）';}
  else{wrongCount++;rb.className='result wrong';rb.textContent='不正解。正解：'+current.imp+'（'+current.hira+'）';}
  updateStats();
}
function showHint(){const h=document.getElementById('hint-text');h.style.display='block';h.textContent='ヒント：'+current.hint;}
function showComplete(){
  document.getElementById('drill-card').style.display='none';
  document.getElementById('complete-box').style.display='block';
  document.getElementById('progress-bar').style.width='100%';
  const pct=verbs.length>0?Math.round((correctCount/verbs.length)*100):0;
  document.getElementById('score-text').textContent=verbs.length+'問中'+correctCount+'問正解　正答率'+pct+'%';
}
restart();
</script>
</body>
</html>
